<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/coin-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toss-a-coin | Explore probabilities</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      (function () {
        function sendEvent() {
          fetch("https://website-analytic-g3up.onrender.com/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              app: "FlipCoin",
              page: window.location.pathname,
              referrer: document.referrer,
              userAgent: navigator.userAgent,
              timestamp: new Date().toISOString(), // better than raw Date.now()
            }),
          }).catch((err) => console.error("Analytics send failed:", err));
        }

        // fire on page load
        sendEvent();

        // optional: fire again on visibility changes (SPA or tab focus)
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) sendEvent();
        });
      })();
    </script>
  </body>
</html>
